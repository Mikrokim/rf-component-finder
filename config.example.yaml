manufacturers:
  minicircuits:
    base_url: "https://www.minicircuits.com"
    rate_limit_rps: 1
cache:
  # Directory where fetched pages are stored (one file per URL).
  cache_dir: .cache/responses
  # Days a stored page stays "fresh" before a live re-fetch is attempted.
  ttl_days: 30
  # Set to false to bypass the cache entirely (always fetch live).
  enabled: true
# anthropic_api_key: ""   # reserved for the future free-form search path
